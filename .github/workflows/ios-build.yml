name: iOS unsigned build (Sideloadly)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: samples/CameraAccess
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private SPM packages (facebook/meta-wearables-dat-ios)
        run: |
          git config --global url."https://x-access-token:${META_SDK_PAT}@github.com/".insteadOf "https://github.com/"
        env:
          META_SDK_PAT: ${{ secrets.META_SDK_PAT }}

      - name: Create Secrets.swift
        run: |
          cat > CameraAccess/Secrets.swift <<EOF
          import Foundation

          enum Secrets {
            static let geminiAPIKey = "${GEMINI_API_KEY}"
            static let openClawHost = "http://YOUR_MAC_HOSTNAME.local"
            static let openClawPort = 18789
            static let openClawHookToken = "YOUR_OPENCLAW_HOOK_TOKEN"
            static let openClawGatewayToken = "YOUR_OPENCLAW_GATEWAY_TOKEN"
            static let webrtcSignalingURL = "ws://YOUR_MAC_IP:8080"
          }
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: List available Xcode versions on this runner
        run: ls -d /Applications/Xcode_*.app | sort -V

      - name: Select a stable Xcode version (avoid bleeding-edge builds that may have SPM download bugs)
        run: |
          # Prefer a mature 16.x release over the newest (possibly unstable) Xcode on the image.
          CANDIDATE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$CANDIDATE" ]; then
            CANDIDATE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
            echo "No Xcode 16.x found, falling back to newest available: $CANDIDATE"
          fi
          echo "Using $CANDIDATE"
          sudo xcode-select -s "$CANDIDATE"
          xcodebuild -version

      - name: Disable Gatekeeper online checks on this ephemeral CI runner (user-authorized)
        run: |
          sudo spctl --master-disable || true
          sudo spctl --status || true

      - name: Unlock/create a CI keychain (common cause of silent xcodebuild hangs)
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains

      - name: Pre-fetch WebRTC xcframework directly (bypass SPM's stalled download)
        run: |
          mkdir -p /tmp/webrtc-prefetch
          curl -fL --retry 3 --max-time 120 \
            -o /tmp/webrtc-prefetch/WebRTC-M140.xcframework.zip \
            "https://github.com/stasel/WebRTC/releases/download/140.0.0/WebRTC-M140.xcframework.zip"
          ls -la /tmp/webrtc-prefetch/
          shasum -a 256 /tmp/webrtc-prefetch/WebRTC-M140.xcframework.zip

      - name: Resolve Swift Package dependencies
        timeout-minutes: 25
        run: |
          attempt=1
          max=3
          until [ $attempt -gt $max ]; do
            echo "Attempt $attempt/$max"
            xcodebuild -resolvePackageDependencies -project CameraAccess.xcodeproj -scheme CameraAccess -verbose &
            pid=$!
            ( sleep 420; kill -9 $pid 2>/dev/null ) &
            watcher=$!
            if wait $pid; then
              kill $watcher 2>/dev/null || true
              exit 0
            fi
            kill $watcher 2>/dev/null || true
            echo "Attempt $attempt failed or stalled (likely the WebRTC binary download), retrying..."
            attempt=$((attempt+1))
            sleep 10
          done
          echo "All attempts failed"
          exit 1

      - name: Build unsigned .app for iOS device
        run: |
          xcodebuild build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Debug \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package into .ipa (unsigned, for Sideloadly to resign)
        run: |
          APP_PATH="build/Build/Products/Debug-iphoneos/CameraAccess.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r CameraAccess-unsigned.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: CameraAccess-unsigned-ipa
          path: samples/CameraAccess/CameraAccess-unsigned.ipa
          retention-days: 7
