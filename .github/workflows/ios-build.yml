name: iOS unsigned build (Sideloadly)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: samples/CameraAccess
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private SPM packages (facebook/meta-wearables-dat-ios)
        run: |
          git config --global url."https://x-access-token:${META_SDK_PAT}@github.com/".insteadOf "https://github.com/"
        env:
          META_SDK_PAT: ${{ secrets.META_SDK_PAT }}

      - name: Create Secrets.swift
        run: |
          cat > CameraAccess/Secrets.swift <<EOF
          import Foundation

          enum Secrets {
            static let geminiAPIKey = "${GEMINI_API_KEY}"
            static let openClawHost = "http://YOUR_MAC_HOSTNAME.local"
            static let openClawPort = 18789
            static let openClawHookToken = "YOUR_OPENCLAW_HOOK_TOKEN"
            static let openClawGatewayToken = "YOUR_OPENCLAW_GATEWAY_TOKEN"
            static let webrtcSignalingURL = "ws://YOUR_MAC_IP:8080"
          }
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Resolve Swift Package dependencies
        run: xcodebuild -resolvePackageDependencies -project CameraAccess.xcodeproj -scheme CameraAccess

      - name: Build unsigned .app for iOS device
        run: |
          xcodebuild build \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Debug \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package into .ipa (unsigned, for Sideloadly to resign)
        run: |
          APP_PATH="build/Build/Products/Debug-iphoneos/CameraAccess.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r CameraAccess-unsigned.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: CameraAccess-unsigned-ipa
          path: samples/CameraAccess/CameraAccess-unsigned.ipa
          retention-days: 7
